name: crawl
on:
  schedule:
    - cron: "15 8 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install yt-dlp
        run: pip install --upgrade yt-dlp
      - run: python crawler.py
        env:
          YT_API_KEYS: ${{ secrets.YT_API_KEYS }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MODE: all
          BUDGET_HERO: "400"
          BUDGET_TUTORIAL: "400"
          BUDGET_VIRAL: "24"
      - name: Save results back to repo
        run: |
          git config user.name "danceworld-crawler"
          git config user.email "crawler@users.noreply.github.com"
          git add -A
          git commit -m "crawler results" || echo "nothing to commit"
          git push
      - name: Score virals (windows all/year/month)
        if: always()
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python score_virals.py
