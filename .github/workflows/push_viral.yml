name: push_viral
on:
  schedule:
    - cron: '55 8 * * *'
  workflow_dispatch:
jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Push viral results to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python - <<'PY'
          import json, os, urllib.request, urllib.parse, urllib.error
          URL=os.environ['SUPABASE_URL']; KEY=os.environ['SUPABASE_SERVICE_KEY']
          BASE=URL+'/rest/v1'
          H={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'}
          def patch(table, slug, payload):
              u=BASE+'/'+table+'?slug=eq.'+urllib.parse.quote(slug)
              req=urllib.request.Request(u, data=json.dumps(payload).encode(), headers=H, method='PATCH')
              try:
                  with urllib.request.urlopen(req) as r:
                      body=r.read().decode()
                  try: return len(json.loads(body))
                  except: return 0
              except urllib.error.HTTPError as e:
                  print('ERR', table, slug, e.code, e.read()[:120]); return -1
          try:
              data=json.load(open('viral_results.json'))
          except FileNotFoundError:
              print('no viral_results.json'); data=[]
          rows = list(data.values()) if isinstance(data, dict) else data
          ok=nomatch=err=skip=0
          for rec in rows:
              if not isinstance(rec, dict): skip+=1; continue
              slug = rec.get('slug')
              vid = rec.get('hero_video_youtube_id')
              if not slug or not vid: skip+=1; continue
              payload = {'hero_video_youtube_id': vid}
              if rec.get('video_stack'): payload['video_stack'] = rec['video_stack']
              n = patch('viral_challenges', slug, payload)
              if n>0: ok+=1
              elif n==0: nomatch+=1
              else: err+=1
          print('VIRAL ok',ok,'nomatch',nomatch,'err',err,'skip',skip)
          PY
