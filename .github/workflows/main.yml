name: crawl
on:
  schedule:
    - cron: "15 8 * * *"
  workflow_dispatch:
jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python crawler.py
        env:
          YT_API_KEYS: ${{ secrets.YT_API_KEYS }}
