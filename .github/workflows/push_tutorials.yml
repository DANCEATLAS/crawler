name: push_tutorials
on:
  schedule:
    - cron: '50 8 * * *'
  workflow_dispatch:
jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Push tutorial results to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python - <<'PY'
          import json, os, urllib.request, urllib.parse, urllib.error
          URL=os.environ['SUPABASE_URL']; KEY=os.environ['SUPABASE_SERVICE_KEY']
          BASE=URL+'/rest/v1'
          H={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'}
          def patch(table, slug, payload):
              u=BASE+'/'+table+'?slug=eq.'+urllib.parse.quote(slug)
              req=urllib.request.Request(u, data=json.dumps(payload).encode(), headers=H, method='PATCH')
              try:
                  with urllib.request.urlopen(req) as r:
                      body=r.read().decode()
                  try: return len(json.loads(body))
                  except: return 0
              except urllib.error.HTTPError as e:
                  print('ERR', table, slug, e.code, e.read()[:120]); return -1
          try:
              tut=json.load(open('tutorial_results.json'))
          except FileNotFoundError:
              print('no tutorial_results.json'); tut={}
          items = tut.items() if isinstance(tut, dict) else [((r.get('slug') if isinstance(r,dict) else None), r) for r in tut]
          ok=nomatch=err=skip=0
          for slug, rec in items:
              if not slug: skip+=1; continue
              lessons = rec.get('lessons') if isinstance(rec, dict) else rec
              if not lessons: skip+=1; continue
              n = patch('dances', slug, {'tutorials': lessons})
              if n>0: ok+=1
              elif n==0: nomatch+=1
              else: err+=1
          print('TUTORIALS ok',ok,'nomatch',nomatch,'err',err,'skip',skip)
          PY
